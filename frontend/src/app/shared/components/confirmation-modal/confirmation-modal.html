<!-- Confirmation Modal -->
<div *ngIf="isVisible" class="fixed inset-0 z-[100] flex flex-col items-center justify-center overflow-hidden px-4 py-6 sm:px-5" role="dialog">
  <!-- Backdrop -->
  <div (click)="onBackdropClick()" class="absolute inset-0 bg-slate-900/60 backdrop-blur transition-opacity duration-300"></div>

  <!-- Modal Content -->
  <div class="relative w-full max-w-md origin-bottom rounded-lg bg-white pb-4 transition-all duration-300 dark:bg-navy-700">
    <!-- Modal Header -->
    <div class="flex justify-between rounded-t-lg bg-slate-200 px-4 py-3 dark:bg-navy-800 sm:px-5">
      <h3 class="text-base font-medium text-slate-700 dark:text-navy-100">
        {{ title }}
      </h3>
      <button (click)="onCancel()" class="btn -mr-1.5 size-7 rounded-full p-0 hover:bg-slate-300/20 focus:bg-slate-300/20 active:bg-slate-300/25 dark:hover:bg-navy-300/20 dark:focus:bg-navy-300/20 dark:active:bg-navy-300/25">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="px-4 py-6 sm:px-5">
      <div class="flex items-start space-x-4">
        <!-- Icon -->
        <div class="flex size-12 shrink-0 items-center justify-center rounded-full"
             [ngClass]="{
               'bg-error/10 dark:bg-error/15': variant === 'error',
               'bg-warning/10 dark:bg-warning/15': variant === 'warning',
               'bg-success/10 dark:bg-success/15': variant === 'success',
               'bg-info/10 dark:bg-info/15': variant === 'info'
             }">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-7" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIcon()" />
          </svg>
        </div>

        <!-- Message -->
        <div class="flex-1">
          <p class="text-slate-700 dark:text-navy-100">{{ message }}</p>
        </div>
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="flex justify-end space-x-2 px-4 sm:px-5">
      <!-- Cancel Button - Only show if cancelText exists -->
      <button
        *ngIf="cancelText"
        (click)="onCancel()"
        class="btn min-w-[7rem] border border-slate-300 font-medium text-slate-800 hover:bg-slate-150 focus:bg-slate-150 active:bg-slate-150/80 dark:border-navy-450 dark:text-navy-50 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90">
        {{ cancelText }}
      </button>

      <!-- Confirm Button -->
      <button
        (click)="onConfirm()"
        class="btn min-w-[7rem] font-medium text-white"
        [ngClass]="{
          'bg-error hover:bg-error-focus focus:bg-error-focus active:bg-error-focus/90': variant === 'error',
          'bg-warning hover:bg-warning-focus focus:bg-warning-focus active:bg-warning-focus/90': variant === 'warning',
          'bg-success hover:bg-success-focus focus:bg-success-focus active:bg-success-focus/90': variant === 'success',
          'bg-primary hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90': variant === 'info'
        }">
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>

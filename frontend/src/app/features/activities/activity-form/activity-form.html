<div class="space-y-5">
  <!-- Assignment Selection -->
  <label class="block">
    <span class="font-medium text-slate-600 dark:text-navy-100">Assignment</span>
    <span class="text-error">*</span>
    <select
      [(ngModel)]="formData.assignmentId"
      class="form-select mt-1.5 w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent"
      [class.border-error]="errors['assignmentId']"
      [class.dark:border-error]="errors['assignmentId']">
      <option value="">Select an assignment</option>
      <option *ngFor="let assignment of assignments" [value]="assignment.id">
        {{ assignment.name }}
      </option>
    </select>
    <span *ngIf="errors['assignmentId']" class="text-tiny+ text-error">{{ errors['assignmentId'] }}</span>
  </label>

  <!-- Request Selection -->
  <label class="block">
    <span class="font-medium text-slate-600 dark:text-navy-100">Request</span>
    <span class="text-error">*</span>
    <select
      [(ngModel)]="formData.requestId"
      class="form-select mt-1.5 w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent"
      [class.border-error]="errors['requestId']"
      [class.dark:border-error]="errors['requestId']">
      <option value="">Select a request</option>
      <option *ngFor="let request of requests" [value]="request.id">
        {{ request.name }}
      </option>
    </select>
    <span *ngIf="errors['requestId']" class="text-tiny+ text-error">{{ errors['requestId'] }}</span>
  </label>

  <!-- Activity Date -->
  <label class="block">
    <span class="font-medium text-slate-600 dark:text-navy-100">Activity Date</span>
    <span class="text-error">*</span>
    <input
      type="text"
      appFlatpickr
      [initialDate]="formData.activityDate || undefined"
      (dateChange)="onActivityDateChange($event)"
      placeholder="Select activity date"
      class="form-input mt-1.5 w-full rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent"
      [class.border-error]="errors['activityDate']"
      [class.dark:border-error]="errors['activityDate']"
      readonly>
    <span *ngIf="errors['activityDate']" class="text-tiny+ text-error">{{ errors['activityDate'] }}</span>
  </label>

  <!-- Description -->
  <label class="block">
    <span class="font-medium text-slate-600 dark:text-navy-100">Description</span>
    <span class="text-error">*</span>
    <textarea
      [(ngModel)]="formData.description"
      rows="4"
      placeholder="Describe the activity in detail..."
      class="form-textarea mt-1.5 w-full resize-none rounded-lg border border-slate-300 bg-transparent px-3 py-2 placeholder:text-slate-400/70 hover:border-slate-400 focus:border-primary dark:border-navy-450 dark:hover:border-navy-400 dark:focus:border-accent"
      [class.border-error]="errors['description']"
      [class.dark:border-error]="errors['description']"></textarea>
    <span *ngIf="errors['description']" class="text-tiny+ text-error">{{ errors['description'] }}</span>
  </label>

  <!-- File Upload -->
  <div class="block">
    <span class="font-medium text-slate-600 dark:text-navy-100">Attachments</span>
    <div class="mt-1.5">
      <label class="btn relative rounded-full bg-slate-150 font-medium text-slate-800 hover:bg-slate-200 focus:bg-slate-200 active:bg-slate-200/80 dark:bg-navy-500 dark:text-navy-50 dark:hover:bg-navy-450 dark:focus:bg-navy-450 dark:active:bg-navy-450/90">
        <input
          type="file"
          (change)="onFileSelected($event)"
          multiple
          class="pointer-events-none absolute inset-0 h-full w-full opacity-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <span>Choose Files</span>
      </label>
    </div>

    <!-- Selected Files List -->
    <div *ngIf="selectedFiles.length > 0" class="mt-3 space-y-2">
      <div *ngFor="let file of selectedFiles; let i = index" class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 dark:border-navy-500 dark:bg-navy-600">
        <div class="flex items-center space-x-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <div>
            <p class="text-sm font-medium text-slate-700 dark:text-navy-100">{{ file.name }}</p>
            <p class="text-tiny+ text-slate-400">{{ formatFileSize(file.size) }}</p>
          </div>
        </div>
        <button (click)="removeFile(i)" type="button" class="btn size-7 rounded-full p-0 hover:bg-slate-300/20 focus:bg-slate-300/20 active:bg-slate-300/25">
          <svg xmlns="http://www.w3.org/2000/svg" class="size-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Form Actions -->
  <div class="flex justify-end space-x-2 pt-4">
    <button
      (click)="onCancel()"
      type="button"
      [disabled]="isSubmitting"
      class="btn min-w-[7rem] rounded-full border border-slate-300 font-medium text-slate-800 hover:bg-slate-150 focus:bg-slate-150 active:bg-slate-150/80 dark:border-navy-450 dark:text-navy-50 dark:hover:bg-navy-500 dark:focus:bg-navy-500 dark:active:bg-navy-500/90">
      Cancel
    </button>
    <button
      (click)="onSubmit()"
      type="button"
      [disabled]="isSubmitting"
      class="btn min-w-[7rem] rounded-full bg-primary font-medium text-white hover:bg-primary-focus focus:bg-primary-focus active:bg-primary-focus/90 dark:bg-accent dark:hover:bg-accent-focus dark:focus:bg-accent-focus dark:active:bg-accent/90">
      <span *ngIf="!isSubmitting">{{ activity ? 'Update' : 'Create' }} Activity</span>
      <span *ngIf="isSubmitting">Saving...</span>
    </button>
  </div>
</div>

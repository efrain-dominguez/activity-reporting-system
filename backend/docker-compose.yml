version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: ars-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: DevPassword123!
    volumes:
      - mongodb_data:/data/db
    networks:
      - ars-network

  mongo-express:
    image: mongo-express:latest
    container_name: ars-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: DevPassword123!
      ME_CONFIG_MONGODB_URL: mongodb://admin:DevPassword123!@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - ars-network

volumes:
  mongodb_data:
    driver: local

networks:
  ars-network:
    driver: bridge